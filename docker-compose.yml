version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: reelo-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=reelo
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: reelo-pgweb
    restart: always
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/reelo?sslmode=disable
    depends_on:
      - db

volumes:
  postgres_data:
